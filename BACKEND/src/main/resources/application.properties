ai.rule-generator.provider=anthropic
ai.rule-generator.model=${AI_RULE_GENERATOR_MODEL:claude-sonnet-4-6}
ai.rule-generator.max-tokens=${AI_RULE_GENERATOR_MAX_TOKENS:1024}
anthropic.api-key=${ANTHROPIC_API_KEY:}

# =============================================================================
# CBK GDI (Central Bank of Kenya) regulatory submissions
# =============================================================================
# Master switch — when false, the app does not submit to CBK at all (config + data
# can still be captured locally). Per-PSP opt-in flag still required to actually fire.
cbk.enabled=${CBK_ENABLED:false}

# CBK GDI environment selector: "live" or "preprod". Determines base host + URL prefix.
# NOTE: regardless of this value, the live host is locked off unless cbk.allow-live=true.
# That gives operators a hard safety belt: even a misconfigured CBK_ENVIRONMENT=live in
# production will still hit pre-prod until CBK_ALLOW_LIVE=true is also explicitly set.
cbk.environment=${CBK_ENVIRONMENT:preprod}
cbk.allow-live=${CBK_ALLOW_LIVE:false}

# Base hosts (per-environment). Defaults match the legacy CBK_EDW project.
cbk.host.live=${CBK_HOST_LIVE:gdicbk.centralbank.go.ke}
cbk.host.preprod=${CBK_HOST_PREPROD:gdi.centralbank.go.ke}

# OAuth2 scope (per-environment). Provided by CBK at onboarding.
cbk.scope.live=${CBK_SCOPE_LIVE:}
cbk.scope.preprod=${CBK_SCOPE_PREPROD:}

# Default OAuth2 client credentials. PSPs that have their own credentials will
# override these via PspCbkConfig (cbk_client_id / cbk_client_secret columns).
cbk.client-id=${CBK_CLIENT_ID:}
cbk.client-secret=${CBK_CLIENT_SECRET:}

# HTTP/timeout/retry tuning
cbk.connect-timeout-ms=${CBK_CONNECT_TIMEOUT_MS:5000}
cbk.read-timeout-ms=${CBK_READ_TIMEOUT_MS:30000}
cbk.token-buffer-seconds=10

# Resilience4j circuit breaker / retry slice for the CBK client
resilience4j.circuitbreaker.instances.cbkGdi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cbkGdi.sliding-window-size=20
resilience4j.circuitbreaker.instances.cbkGdi.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cbkGdi.wait-duration-in-open-state=60s
resilience4j.retry.instances.cbkGdi.max-attempts=3
resilience4j.retry.instances.cbkGdi.wait-duration=2s

# ========================================================================
# Redis (Spring Data Redis / Lettuce) — hot-path feature cache + cache-aside
# Spring Boot 3.2 namespace: spring.data.redis.*
# ========================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ========================================================================
# Regulator-side submission clients (FinCEN / FCA / OFAC)
# Real, deploy-ready HTTP clients; gated by .enabled=false until regulator
# credentials arrive. When .enabled=true and the endpoint is blank, the
# client throws RegulatorSubmissionDisabledException and the SAR is parked
# in SUBMISSION_PENDING — never a fabricated submission ID.
# ========================================================================
regulators.fincen.enabled=${REGULATORS_FINCEN_ENABLED:false}
regulators.fincen.endpoint=${REGULATORS_FINCEN_ENDPOINT:}
regulators.fincen.keystore-path=${REGULATORS_FINCEN_KEYSTORE_PATH:}
regulators.fincen.keystore-password=${REGULATORS_FINCEN_KEYSTORE_PASSWORD:}
regulators.fincen.timeout=30s

regulators.fca.enabled=${REGULATORS_FCA_ENABLED:false}
regulators.fca.endpoint=${REGULATORS_FCA_ENDPOINT:}
regulators.fca.api-key=${REGULATORS_FCA_API_KEY:}
regulators.fca.hmac-secret=${REGULATORS_FCA_HMAC_SECRET:}
regulators.fca.timeout=15s

regulators.ofac.enabled=${REGULATORS_OFAC_ENABLED:false}
regulators.ofac.sdn-feed-url=${REGULATORS_OFAC_SDN_FEED_URL:https://www.treasury.gov/ofac/downloads/sdn.xml}
regulators.ofac.timeout=60s

# Resilience4j slices for the regulator clients (per-regulator instance names)
resilience4j.circuitbreaker.instances.regulator-fincen.sliding-window-size=10
resilience4j.circuitbreaker.instances.regulator-fincen.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.regulator-fincen.wait-duration-in-open-state=120s
resilience4j.retry.instances.regulator-fincen.max-attempts=3
resilience4j.retry.instances.regulator-fincen.wait-duration=5s

resilience4j.circuitbreaker.instances.regulator-fca.sliding-window-size=10
resilience4j.circuitbreaker.instances.regulator-fca.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.regulator-fca.wait-duration-in-open-state=120s
resilience4j.retry.instances.regulator-fca.max-attempts=3
resilience4j.retry.instances.regulator-fca.wait-duration=5s

resilience4j.circuitbreaker.instances.regulator-ofac.sliding-window-size=10
resilience4j.circuitbreaker.instances.regulator-ofac.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.regulator-ofac.wait-duration-in-open-state=120s
resilience4j.retry.instances.regulator-ofac.max-attempts=3

# ========================================================================
# Spring Cache (Caffeine L2 in-process cache)
# Per-cache TTL and sizes are configured programmatically in CacheConfig.java.
# The properties below document the logical intent and allow overrides via
# environment variables if a future cache abstraction layer reads them.
#
# Cache     | TTL    | Max entries | Eviction trigger
# ----------|--------|-------------|-----------------------------
# psps      | 15 min |         500 | PSP profile/theme/status update
# users     | 5 min  |       2 000 | password change, update, delete, toggle
# sanctions | 10 min |      50 000 | automatic (TTL-based only)
# dashboard-kpis | 60 sec |    10  | automatic (TTL-based only)
# cbk-config | 30 min |       200  | automatic (TTL-based only)
# ========================================================================
spring.cache.type=caffeine
spring.cache.cache-names=psps,users,sanctions,dashboard-kpis,cbk-config,modelConfig,aggregateFeatures,riskScores,screeningResults
resilience4j.retry.instances.regulator-ofac.wait-duration=5s
