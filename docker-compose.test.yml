# Test / UAT Environment
# Ports: Backend 2638, Frontend 5174, Postgres 15432, Aerospike 3002

version: '3.8'

services:
  # PostgreSQL Database (Test) - Port 15432
  postgres-test:
    image: postgres:15-alpine
    container_name: fd-test-postgres
    environment:
      POSTGRES_DB: fraud_detector_test
      POSTGRES_USER: fd_test
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test_secure_2024}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fd_test -d fraud_detector_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-test-network
    restart: unless-stopped

  # Aerospike Cache (Test) - Port 3002
  aerospike-test:
    image: aerospike/aerospike-server:6.4
    container_name: fd-test-aerospike
    ports:
      - "3002:3000"
    volumes:
      - aerospike_test_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-test-network
    restart: unless-stopped

  # Backend API (Test) - Port 2638
  backend-test:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fd-test-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-test:5432/fraud_detector_test
      DATABASE_USERNAME: fd_test
      DATABASE_PASSWORD: ${TEST_DB_PASSWORD:-test_secure_2024}
      AEROSPIKE_HOSTS: aerospike-test:3000
      SERVER_PORT: 2638
      SPRING_PROFILES_ACTIVE: test
      CORS_ALLOWED_ORIGINS: https://testaml.hokeka.com,https://testapi.hokeka.com
    ports:
      - "2638:2638"
    depends_on:
      postgres-test:
        condition: service_healthy
      aerospike-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2638/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fd-test-network
    restart: unless-stopped

  # Frontend (Test) - Port 5174
  frontend-test:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://testapi.hokeka.com
    container_name: fd-test-frontend
    environment:
      VITE_API_URL: https://testapi.hokeka.com
    ports:
      - "5174:80"
    depends_on:
      - backend-test
    networks:
      - fd-test-network
    restart: unless-stopped

volumes:
  postgres_test_data:
  aerospike_test_data:

networks:
  fd-test-network:
    driver: bridge
