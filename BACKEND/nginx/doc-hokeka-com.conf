# =============================================================================
# NGINX Configuration for API Documentation - doc.hokeka.com
# Enhanced with Rate Limiting + Security Headers
# =============================================================================

upstream fraud_detector_backend {
    server 127.0.0.1:2637;
    keepalive 32;
}

# Rate limiting for documentation (prevent abuse)
limit_req_zone $binary_remote_addr zone=doc_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=doc_strict:10m rate=10r/m;

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name doc.hokeka.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name doc.hokeka.com;

    # SSL Configuration (reusing hokeka.com certificate)
    ssl_certificate /etc/letsencrypt/live/hokeka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hokeka.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hokeka.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers (Documentation site)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self'; connect-src 'self' https://doc.hokeka.com;" always;

    # Logging
    access_log /var/log/nginx/doc-hokeka-access.log;
    error_log /var/log/nginx/doc-hokeka-error.log;

    # Rate limiting on documentation
    limit_req zone=doc_general burst=20 nodelay;

    # Main Swagger UI
    location / {
        limit_req zone=doc_strict burst=5 nodelay;

        proxy_pass http://fraud_detector_backend/api/v1/swagger-ui.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI JSON
    location /v3/api-docs {
        limit_req zone=doc_general burst=10 nodelay;

        proxy_pass http://fraud_detector_backend/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger static resources
    location /swagger-ui/ {
        proxy_pass http://fraud_detector_backend/api/v1/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# Redirect doc.testaml.hokeka.com -> doc.hokeka.com
server {
    listen 80;
    server_name doc.testaml.hokeka.com;
    return 301 https://doc.hokeka.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name doc.testaml.hokeka.com;

    ssl_certificate /etc/letsencrypt/live/hokeka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hokeka.com/privkey.pem;

    return 301 https://doc.hokeka.com$request_uri;
}
