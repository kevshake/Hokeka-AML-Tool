# Test Environment Nginx Configuration
# CURRENTLY: Open access (time restriction disabled)
# FUTURE: Time-based access 9am-11am EAT (6am-8am UTC) - see commented section below

server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ============================================================================
    # TIME-BASED ACCESS CONTROL (DISABLED FOR NOW)
    # Uncomment this section when moving to preprod to restrict access times
    # ============================================================================
    # 
    # # Time-based access control - 9am-11am EAT = 6am-8am UTC
    # set $allowed_time 0;
    # 
    # if ($time_hour >= 6) {
    #     set $allowed_time 1;
    # }
    # if ($time_hour >= 8) {
    #     set $allowed_time 0;
    # }
    # 
    # if ($allowed_time = 0) {
    #     return 503 "Test environment is only available 9am-11am EAT (6am-8am UTC). Current time: $time_iso8601";
    # }
    # ============================================================================
    
    # Frontend
    location / {
        proxy_pass http://frontend-test:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend-test:80;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend-test:2637/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# To enable time-based access later:
# 1. Uncomment the time control section above
# 2. Restart nginx: docker compose -f docker-compose.test.yml restart nginx-test
# 3. Test environment will then only be accessible 9am-11am EAT
