server:
  port: 8091

spring:
  application:
    name: hokeka-aml-microservice

aerospike:
  host: ${AEROSPIKE_HOST:fd-test-aerospike}
  port: ${AEROSPIKE_PORT:3000}

aml:
  # Shared symmetric key required by InternalAuthFilter on /internal/**.
  # Empty => filter disabled (dev only). Production MUST set AML_MS_INTERNAL_KEY.
  internal-auth-key: ${AML_MS_INTERNAL_KEY:}

sanctions:
  match:
    similarity:
      # Lower bound for emitting a match. Status FLAGGED at >=0.95, REVIEW in [threshold, 0.95).
      threshold: ${SANCTIONS_SIMILARITY_THRESHOLD:0.8}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
