server:
  port: 8091

spring:
  application:
    name: hokeka-aml-microservice

aerospike:
  host: ${AEROSPIKE_HOST:fd-test-aerospike}
  port: ${AEROSPIKE_PORT:3000}

aml:
  # Shared symmetric key required by InternalAuthFilter on /internal/**.
  # Empty => filter disabled (dev only). Production MUST set AML_MS_INTERNAL_KEY.
  internal-auth-key: ${AML_MS_INTERNAL_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
