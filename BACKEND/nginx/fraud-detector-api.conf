# =============================================================================
# NGINX Configuration for Fraud Detector API
# Domain: api.hokeka.com or hokeka.com/api
# Backend: Spring Boot on localhost:2637
# =============================================================================

# Upstream backend server
upstream fraud_detector_backend {
    server 127.0.0.1:2637;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# =============================================================================
# Server Block: api.hokeka.com (RECOMMENDED - dedicated API subdomain)
# =============================================================================
server {
    listen 80;
    server_name api.hokeka.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.hokeka.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/hokeka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hokeka.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hokeka.com/chain.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Logging
    access_log /var/log/nginx/fraud-detector-access.log;
    error_log /var/log/nginx/fraud-detector-error.log;

    # Body size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (bypass rate limiting)
    location /actuator/health {
        proxy_pass http://fraud_detector_backend/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache health checks for 5 seconds
        proxy_cache_valid 200 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Auth endpoints - strict rate limiting
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_conn api_conn 10;
        
        proxy_pass http://fraud_detector_backend/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://hokeka.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://hokeka.com";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
    }

    # Main API endpoints
    location /api/v1/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_conn api_conn 50;
        
        proxy_pass http://fraud_detector_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://hokeka.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Api-Key" always;
        add_header Access-Control-Expose-Headers "X-Total-Count, X-Page-Count, X-Current-Page" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://hokeka.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Api-Key";
            add_header Access-Control-Expose-Headers "X-Total-Count, X-Page-Count, X-Current-Page";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
    }

    # Actuator endpoints (restricted)
    location /actuator/ {
        # Allow only specific IPs or use basic auth
        # allow 127.0.0.1;
        # deny all;
        
        proxy_pass http://fraud_detector_backend/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root redirect to API documentation or status
    location / {
        return 200 '{"status":"Fraud Detector API","version":"1.0.0","documentation":"/api/v1/swagger-ui.html"}';
        add_header Content-Type application/json;
    }
}

# =============================================================================
# Server Block: hokeka.com/api (Alternative - path-based routing)
# =============================================================================
server {
    listen 80;
    server_name hokeka.com www.hokeka.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hokeka.com www.hokeka.com;

    # SSL Configuration (same as above)
    ssl_certificate /etc/letsencrypt/live/hokeka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hokeka.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hokeka.com/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =============================================================================
    # API Path Routing: hokeka.com/api/* -> backend:2637/api/v1/*
    # =============================================================================
    location /api/ {
        # Rewrite /api/* to /api/v1/* before proxying
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        
        limit_req zone=api_general burst=20 nodelay;
        limit_conn api_conn 50;
        
        proxy_pass http://fraud_detector_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://hokeka.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Api-Key" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://hokeka.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Api-Key";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }
    }

    # Default location for main site
    location / {
        # Your main site content here
        # Or proxy to frontend application
        root /var/www/hokeka;
        try_files $uri $uri/ /index.html;
    }
}
