# Test configuration — keeps the Spring context light.
spring.main.allow-bean-definition-overriding=true

# Disable context-path so MockMvc URLs match controller @RequestMapping directly.
server.servlet.context-path=

# Disable Flyway, JPA, Kafka, Neo4j, etc. for slice tests.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveDataAutoConfiguration

# Notification fallback (used by NotificationServiceLogOnlyTest).
notifications.email-enabled=false
notifications.from-address=test@example.com
spring.mail.host=

# Aml microservice — disabled in tests, real WebClient never called.
aml.microservice.enabled=false
aml.microservice.base-url=http://localhost:0
aml.microservice.internal-auth-key=
aml.microservice.connect-timeout-ms=100
aml.microservice.read-timeout-ms=100

# Resilience4j — mirror prod config so @CircuitBreaker / @Retry annotations resolve.
resilience4j.circuitbreaker.instances.amlMicroservice.sliding-window-size=5
resilience4j.circuitbreaker.instances.amlMicroservice.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.amlMicroservice.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.amlMicroservice.permitted-number-of-calls-in-half-open-state=1
resilience4j.timelimiter.instances.amlMicroservice.timeout-duration=200ms
resilience4j.retry.instances.amlMicroservice.max-attempts=1
resilience4j.retry.instances.amlMicroservice.wait-duration=10ms
