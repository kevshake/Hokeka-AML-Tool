version: '3.8'

# Development Environment
# - Hot reload enabled for frontend
# - Backend runs with dev profile
# - All services exposed on standard ports
# - Volume mounts for live code editing

services:
  # PostgreSQL Database
  postgres-dev:
    image: postgres:15-alpine
    container_name: fraud-detector-postgres-dev
    environment:
      POSTGRES_DB: fraud_detector_dev
      POSTGRES_USER: ${DATABASE_USERNAME:-fraud_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-fraud_user} -d fraud_detector_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-dev-network

  # Aerospike Cache
  aerospike-dev:
    image: aerospike/aerospike-server:6.4
    container_name: fraud-detector-aerospike-dev
    ports:
      - "3000:3000"
    volumes:
      - aerospike_dev_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-dev-network

  # Backend API (Development mode)
  backend-dev:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fraud-detector-backend-dev
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/fraud_detector_dev
      DATABASE_USERNAME: ${DATABASE_USERNAME:-fraud_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-dev_password}
      AEROSPIKE_HOSTS: aerospike-dev:3000
      SECURITY_ENCRYPTION_KEY: ${SECURITY_ENCRYPTION_KEY:-dev_encryption_key_change_in_production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://dev-fraud.hokeka.com}
      SERVER_PORT: 2637
      SPRING_PROFILES_ACTIVE: dev
      LOGGING_LEVEL_ROOT: DEBUG
    ports:
      - "2637:2637"
    volumes:
      # Mount source for hot reload (optional - requires dev tools)
      - ./BACKEND/src:/app/src:ro
    depends_on:
      postgres-dev:
        condition: service_healthy
      aerospike-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2637/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fraud-detector-dev-network

  # Frontend (Development server with hot reload)
  frontend-dev:
    image: node:20-alpine
    container_name: fraud-detector-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:2637/api
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./FRONTEND:/app
      - node_modules_dev:/app/node_modules
    depends_on:
      - backend-dev
    networks:
      - fraud-detector-dev-network

volumes:
  postgres_dev_data:
  aerospike_dev_data:
  node_modules_dev:

networks:
  fraud-detector-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
