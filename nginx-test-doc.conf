# Test Environment Documentation - doc.testaml.hokeka.com or doc.hokeka.com
server {
    listen 80;
    server_name doc.hokeka.com doc.testaml.hokeka.com;

    # No SSL in test (or use self-signed)
    # For production test, add SSL similar to prod

    access_log /var/log/nginx/doc-test-access.log;
    error_log /var/log/nginx/doc-test-error.log;

    location / {
        proxy_pass http://fraud_detector_backend:2637/api/v1/swagger-ui.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://fraud_detector_backend:2637/api/v1/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_pass http://fraud_detector_backend:2637/api/v1/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}