# Application Test Environment - Quick Fix

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:15432/fraud_detector_test}
spring.datasource.username=${DATABASE_USERNAME:fraud_detector_test}
spring.datasource.password=${DATABASE_PASSWORD:test_password_secure}

# JPA/Hibernate - Flyway owns the schema; Hibernate only validates against it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway manages schema for test env (same as prod defaults in application.properties)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Initialize data.sql after schema creation
spring.sql.init.mode=never

# Logging
logging.level.root=INFO
logging.level.com.posgateway.aml=DEBUG
logging.level.org.hibernate.SQL=INFO

# Disable external services for testing
sumsub.enabled=false
scoring.service.enabled=false
sanctions.download.enabled=false
dl4j.enabled=false

# Disable health indicators that have no test equivalents
management.health.mail.enabled=false
management.health.neo4j.enabled=false

# Aerospike removed from BACKEND — Aerospike now lives in aml-microservice.
# aerospike.enabled=false

# Disable Kafka for testing
kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:19092

# Security
custom.jwt.secret=${JWT_SECRET:test-secret-key-for-development-only-do-not-use-in-production}
