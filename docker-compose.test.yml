# Test / UAT Environment
# Ports: Backend 2638, Frontend 5174, Postgres 15432 (external), Aerospike 3002

services:
  # Aerospike Cache (Test) - Port 3002
  aerospike-test:
    image: aerospike/aerospike-server:6.4
    container_name: fd-test-aerospike
    ports:
      - "3002:3000"
    volumes:
      - aerospike_test_data:/opt/aerospike/data
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-test-network
    restart: unless-stopped

  # Backend API (Test) - Port 2638
  backend-test:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile.test
    container_name: fd-test-backend
    environment:
      DATABASE_URL: jdbc:postgresql://fraud-detector-postgres-test:5432/fraud_detector_test
      DATABASE_USERNAME: fraud_detector_test
      DATABASE_PASSWORD: test_password_secure
      AEROSPIKE_HOSTS: fd-test-aerospike:3000
      SERVER_PORT: 2638
      SPRING_PROFILES_ACTIVE: test
      CORS_ALLOWED_ORIGINS: https://testaml.hokeka.com,https://testapi.hokeka.com
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC"
    ports:
      - "2638:2638"
    depends_on:
      aerospike-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2638/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fd-test-network
      - test_fraud-detector-test
    restart: unless-stopped

  # Frontend (Test) - Port 5174
  frontend-test:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://testapi.hokeka.com
    container_name: fd-test-frontend
    environment:
      VITE_API_URL: https://testapi.hokeka.com
    ports:
      - "5174:80"
    depends_on:
      backend-test:
        condition: service_healthy
    networks:
      - fd-test-network
    restart: unless-stopped

volumes:
  aerospike_test_data:

networks:
  fd-test-network:
    driver: bridge
  test_fraud-detector-test:
    external: true
