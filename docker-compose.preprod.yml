version: '3.8'

# Pre-Production / UAT Environment
# - Production-like configuration
# - Nginx serves static frontend
# - Isolated ports from dev environment
# - SSL-ready configuration

services:
  # PostgreSQL Database (Preprod)
  postgres-preprod:
    image: postgres:15-alpine
    container_name: fraud-detector-postgres-preprod
    environment:
      POSTGRES_DB: fraud_detector_preprod
      POSTGRES_USER: ${DATABASE_USERNAME:-fraud_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-preprod_strong_password}
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"  # Different port from dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-fraud_user} -d fraud_detector_preprod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-preprod-network
    restart: unless-stopped

  # Aerospike Cache (Preprod)
  aerospike-preprod:
    image: aerospike/aerospike-server:6.4
    container_name: fraud-detector-aerospike-preprod
    ports:
      - "13000:3000"  # Different port from dev
    volumes:
      - aerospike_preprod_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-preprod-network
    restart: unless-stopped

  # Backend API (Preprod)
  backend-preprod:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fraud-detector-backend-preprod
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-preprod:5432/fraud_detector_preprod
      DATABASE_USERNAME: ${DATABASE_USERNAME:-fraud_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-preprod_strong_password}
      AEROSPIKE_HOSTS: aerospike-preprod:3000
      SECURITY_ENCRYPTION_KEY: ${SECURITY_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://preprod-fraud.hokeka.com}
      SERVER_PORT: 2637
      SPRING_PROFILES_ACTIVE: preprod
      LOGGING_LEVEL_ROOT: INFO
    depends_on:
      postgres-preprod:
        condition: service_healthy
      aerospike-preprod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2637/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fraud-detector-preprod-network
    restart: unless-stopped

  # Frontend (Preprod - nginx serves static)
  frontend-preprod:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: fraud-detector-frontend-preprod
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend-preprod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - fraud-detector-preprod-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Preprod)
  nginx-preprod:
    image: nginx:1.25-alpine
    container_name: fraud-detector-nginx-preprod
    ports:
      - "8080:80"  # Different port from dev
      # - "8443:443"  # Enable for SSL testing
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl-preprod:/etc/nginx/ssl:ro  # Mount SSL certificates here
    depends_on:
      frontend-preprod:
        condition: service_healthy
      backend-preprod:
        condition: service_healthy
    networks:
      - fraud-detector-preprod-network
    restart: unless-stopped

volumes:
  postgres_preprod_data:
  aerospike_preprod_data:

networks:
  fraud-detector-preprod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
