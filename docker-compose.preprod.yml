# Pre-Production Environment
# Ports: Backend 2639, Frontend 8089, Postgres 25433, Aerospike 3001

version: '3.8'

services:
  # PostgreSQL Database (Preprod) - Port 25433
  postgres-preprod:
    image: postgres:15-alpine
    container_name: fd-preprod-postgres
    environment:
      POSTGRES_DB: fraud_detector_preprod
      POSTGRES_USER: fd_preprod
      POSTGRES_PASSWORD: ${PREPROD_DB_PASSWORD:-preprod_secure_2024}
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fd_preprod -d fraud_detector_preprod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Aerospike Cache (Preprod) - Port 3001
  aerospike-preprod:
    image: aerospike/aerospike-server:6.4
    container_name: fd-preprod-aerospike
    ports:
      - "3001:3000"
    volumes:
      - aerospike_preprod_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Backend API (Preprod) - Port 2639
  backend-preprod:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fd-preprod-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-preprod:5432/fraud_detector_preprod
      DATABASE_USERNAME: fd_preprod
      DATABASE_PASSWORD: ${PREPROD_DB_PASSWORD:-preprod_secure_2024}
      AEROSPIKE_HOSTS: aerospike-preprod:3000
      SERVER_PORT: 2639
      SPRING_PROFILES_ACTIVE: preprod
      CORS_ALLOWED_ORIGINS: https://preprod-aml.hokeka.com,https://preprod-api.hokeka.com
    ports:
      - "2639:2639"
    depends_on:
      postgres-preprod:
        condition: service_healthy
      aerospike-preprod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2639/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Frontend (Preprod) - Port 8089
  frontend-preprod:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://preprod-api.hokeka.com
    container_name: fd-preprod-frontend
    environment:
      VITE_API_URL: https://preprod-api.hokeka.com
    ports:
      - "8089:80"
    depends_on:
      - backend-preprod
    networks:
      - fd-preprod-network
    restart: unless-stopped

volumes:
  postgres_preprod_data:
  aerospike_preprod_data:

networks:
  fd-preprod-network:
    driver: bridge
