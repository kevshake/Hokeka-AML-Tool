version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-detector-postgres
    environment:
      POSTGRES_USER: fraud_detector
      POSTGRES_PASSWORD: fraud_detector_dev
      POSTGRES_DB: fraud_detector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_detector -d fraud_detector"]
      interval: 5s
      timeout: 5s
      retries: 5

  aerospike:
    image: aerospike/aerospike-server:latest
    container_name: fraud-detector-aerospike
    ports:
      - "3000:3000"
    volumes:
      - aerospike_data:/opt/aerospike/data
    # Optional - can disable if not needed

volumes:
  postgres_data:
  aerospike_data:
