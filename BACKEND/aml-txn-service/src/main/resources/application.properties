spring.application.name=aml-txn-service
server.port=2637

# PostgreSQL
spring.datasource.url=${AML_PG_URL:jdbc:postgresql://aml-postgres:5432/fraud_detector}
spring.datasource.username=${AML_PG_USER:aml_user}
spring.datasource.password=${AML_PG_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=${AML_KAFKA_BOOTSTRAP:aml-kafka:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

aml.kafka.topics.raw=transactions.ingested
aml.kafka.topics.scored=aml.txn.scored
aml.kafka.topics.decision=aml.txn.decision

# Aerospike
aml.aerospike.hosts=${AML_AEROSPIKE_HOSTS:aml-aerospike:3000}
aml.aerospike.namespace=${AML_AEROSPIKE_NAMESPACE:aml}
aml.aerospike.txn-hot.ttl-seconds=3600

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.org.springframework=INFO
logging.level.com.hokeka=DEBUG
