# =============================================================================
# H2 in-memory profile — layered ON TOP of `dev` (start with: -Dspring.profiles.active=dev,h2)
# Lets you click around the UI without Postgres / Aerospike / Neo4j / Kafka / Docker.
# Hibernate generates the schema from JPA entities; Flyway is OFF because the
# 140 Postgres migrations (JSONB, GIN, etc.) won't run on H2.
# =============================================================================

# --- Datasource: H2 in-memory in PostgreSQL compatibility mode -----------------
spring.datasource.url=jdbc:h2:mem:aml;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS jsonb AS CLOB\\;CREATE DOMAIN IF NOT EXISTS JSONB AS CLOB
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate: build schema from entities ------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
# NOTE: globally_quoted_identifiers was tried here but H2 then treated column
# type names like TEXT and jsonb as user domains and failed schema generation.
# Reserved-word column names are handled per-entity instead (see ModelConfig).
#
# Envers writes its REVTYPE column as TINYINT, which H2 does not recognise.
# Audit history isn't needed for clicking around the UI, so disable it.
spring.jpa.properties.hibernate.envers.autoRegisterListeners=false
spring.jpa.properties.hibernate.integration.envers.enabled=false

# --- Flyway OFF (Postgres-only migrations) ------------------------------------
spring.flyway.enabled=false

# --- Disable external infra: Neo4j, Kafka -------------------------------------
management.health.neo4j.enabled=false
management.health.kafka.enabled=false
management.health.redis.enabled=false
management.health.mail.enabled=false

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.metrics.KafkaMetricsAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

# Kafka / Redis / Neo4j endpoints intentionally blank so any direct property reads
# don't try to connect.
spring.kafka.bootstrap-servers=
kafka.enabled=false
neo4j.enabled=false

# AML microservice (Aerospike-backed) disabled — screening features will return
# empty/no-op results in this profile.
aml.microservice.enabled=false

# --- Spring misc --------------------------------------------------------------
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# --- H2 web console at /api/v1/h2 (handy for debugging) -----------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# --- Logging ------------------------------------------------------------------
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.schema=WARN
