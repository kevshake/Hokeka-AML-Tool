<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hokeka — Secure Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --midnight: #060b14;
            --deep-navy: #0d1b2a;
            --navy: #112240;
            --navy-light: #1a2f4a;

            --gold: #c9a84c;
            --gold-light: #e8c870;
            --gold-pale: #f5e6b8;
            --gold-dim: rgba(201, 168, 76, 0.15);
            --gold-glow: rgba(201, 168, 76, 0.25);

            --platinum: #e2e8f0;
            --silver: #94a3b8;
            --muted: #4a6080;

            --glass-bg: rgba(13, 27, 42, 0.65);
            --glass-border: rgba(201, 168, 76, 0.18);
            --glass-blur: blur(20px);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(17, 34, 64, 0.8) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(13, 27, 42, 0.5) 0%, transparent 70%),
                linear-gradient(145deg, var(--midnight) 0%, #091525 50%, #060d18 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--platinum);
            overflow: hidden;
        }

        /* Subtle animated grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201, 168, 76, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 168, 76, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating orb accent */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.04) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }

        /* Brand mark above card */
        .brand-mark {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-mark .shield-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.875rem;
            box-shadow:
                0 0 0 1px rgba(201, 168, 76, 0.3),
                0 8px 24px rgba(201, 168, 76, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .brand-mark .shield-icon i {
            font-size: 1.4rem;
            color: var(--midnight);
        }

        .brand-mark .brand-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--platinum);
            display: block;
            line-height: 1;
        }

        .brand-mark .brand-tagline {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-top: 0.5rem;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 2.75rem 2.5rem;
            border-radius: 20px;
            box-shadow:
                0 32px 64px -16px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(201, 168, 76, 0.06),
                inset 0 1px 0 rgba(201, 168, 76, 0.12),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Subtle top shimmer line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.5), transparent);
        }

        .login-card-header {
            margin-bottom: 2rem;
        }

        .login-card-header h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 500;
            color: var(--platinum);
            letter-spacing: 0.02em;
            margin-bottom: 0.35rem;
        }

        .login-card-header p {
            font-size: 0.8rem;
            color: var(--silver);
            font-weight: 300;
            letter-spacing: 0.03em;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(6, 11, 20, 0.5);
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 10px;
            color: var(--platinum);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            letter-spacing: 0.02em;
        }

        .form-control::placeholder {
            color: var(--muted);
            font-weight: 300;
        }

        .form-control:focus {
            outline: none;
            border-color: rgba(201, 168, 76, 0.5);
            background: rgba(6, 11, 20, 0.7);
            box-shadow:
                0 0 0 3px rgba(201, 168, 76, 0.08),
                inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #b8924a 0%, #c9a84c 40%, #d4b660 100%);
            color: var(--midnight);
            border: none;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 4px 16px rgba(201, 168, 76, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow:
                0 8px 24px rgba(201, 168, 76, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(201, 168, 76, 0.2);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0 1.25rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(201, 168, 76, 0.12);
        }

        .forgot-link {
            display: block;
            text-align: center;
            font-size: 0.78rem;
            color: var(--silver);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .forgot-link i {
            margin-right: 0.35rem;
            font-size: 0.7rem;
            color: var(--gold);
        }

        .forgot-link:hover {
            color: var(--gold-light);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #f1a1a9;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .alert-error i {
            margin-top: 1px;
            flex-shrink: 0;
            color: #f87171;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(201, 168, 76, 0.08);
        }

        .security-badge span {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .security-badge i {
            font-size: 0.6rem;
            color: rgba(201, 168, 76, 0.4);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="brand-mark">
            <div class="shield-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <span class="brand-name">Hokeka</span>
            <span class="brand-tagline">AML Intelligence Platform</span>
        </div>

        <div class="login-card">
            <div class="login-card-header">
                <h2>Welcome back</h2>
                <p>Sign in to access your compliance dashboard</p>
            </div>

            <div id="error-msg" class="alert-error" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span>Invalid credentials. Please try again.</span>
            </div>

            <form action="perform_login" method="POST" id="loginForm">
                <input type="hidden" name="_csrf" id="csrfToken">

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter your username" autocomplete="username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right-to-bracket" style="margin-right: 0.5rem;"></i>
                    Sign In
                </button>
            </form>

            <div class="divider"></div>

            <a href="/password-reset.html" class="forgot-link">
                <i class="fas fa-key"></i>
                Forgot your password?
            </a>

            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <span>256-bit encrypted &nbsp;·&nbsp; ISO 27001 compliant</span>
            </div>
        </div>
    </div>

    <div style="position: fixed; bottom: 1rem; right: 1.25rem; font-size: 0.6rem; color: rgba(201, 168, 76, 0.25); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 300;">
        Powered by Hokeka
    </div>

    <script>
        fetch('auth/csrf', { credentials: 'include' })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    document.getElementById('csrfToken').value = data.token;
                }
            })
            .catch(() => {
                const btn = document.querySelector('.btn-login');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:0.5rem"></i>Login unavailable';
            });

        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');

        if (error) {
            const errorMsgDiv = document.getElementById('error-msg');
            let msg = '';

            switch (error) {
                case 'bad_credentials':
                    msg = 'Invalid username or password. Please try again.';
                    break;
                case 'disabled':
                    msg = 'Your account is disabled. Please contact your administrator.';
                    break;
                case 'locked':
                    msg = 'Your account is locked due to multiple failed attempts.';
                    break;
                case 'system_error':
                    msg = 'A system error occurred. Please try again later.';
                    break;
                case 'user_not_found':
                    msg = 'No account found with that username.';
                    break;
                case 'expired':
                    msg = 'Your credentials have expired. Please contact your administrator.';
                    break;
                default:
                    const safeError = document.createElement('span');
                    safeError.textContent = error;
                    msg = 'Authentication failed: ' + safeError.textContent;
            }

            errorMsgDiv.querySelector('span').textContent = msg;
            errorMsgDiv.style.display = 'flex';
        } else if (urlParams.get('expired')) {
            const errorMsgDiv = document.getElementById('error-msg');
            errorMsgDiv.querySelector('i').className = 'fas fa-clock';
            errorMsgDiv.querySelector('span').textContent = 'Your session has expired. Please sign in again.';
            errorMsgDiv.style.display = 'flex';
        } else if (urlParams.get('invalid')) {
            const errorMsgDiv = document.getElementById('error-msg');
            errorMsgDiv.querySelector('span').textContent = 'Invalid session. Please sign in again.';
            errorMsgDiv.style.display = 'flex';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            const redirectPath = sessionStorage.getItem('redirectAfterLogin');
            const safePath = redirectPath && redirectPath.startsWith('/') && !redirectPath.startsWith('//') ? redirectPath : '/dashboard';
            const redirectInput = document.createElement('input');
            redirectInput.type = 'hidden';
            redirectInput.name = 'redirect';
            redirectInput.value = safePath;
            this.appendChild(redirectInput);
        });
    </script>
</body>

</html>
