version: "3.8"

# High-Performance AML System Infrastructure
# Includes: Kafka, Zookeeper, Redis, PostgreSQL (partitioned), ClickHouse

services:
  # ============================================================
  # ZOOKEEPER (Kafka coordination)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aml-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - aml-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # KAFKA BROKER
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aml-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # Performance tuning
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - aml-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # KAFKA UI (Management)
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aml-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8085:8080"
    networks:
      - aml-network

  # ============================================================
  # REDIS (Feature Cache)
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: aml-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aml-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # REDIS COMMANDER (Redis UI)
  # ============================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aml-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8086:8081"
    depends_on:
      - redis
    networks:
      - aml-network

  # ============================================================
  # POSTGRESQL (Partitioned Tables)
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: aml-postgres
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_secure_2024
      POSTGRES_DB: fraud_detector
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema-partitioned.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init-scripts:/docker-entrypoint-initdb.d/:ro
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=10485kB
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
    networks:
      - aml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_detector"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # CLICKHOUSE (Analytics)
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: aml-clickhouse
    environment:
      CLICKHOUSE_DB: fraud_analytics
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics_secure_2024
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aml-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ============================================================
  # AML BACKEND (High-Performance)
  # ============================================================
  backend-hp:
    build:
      context: ../backend
      dockerfile: Dockerfile.hp
    container_name: aml-backend-hp
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Spring
      SPRING_PROFILES_ACTIVE: high-perf
      SERVER_PORT: 8080
      
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud_detector
      SPRING_DATASOURCE_USERNAME: fraud_user
      SPRING_DATASOURCE_PASSWORD: fraud_secure_2024
      
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      
      # JVM tuning for high throughput
      JAVA_OPTS: >
        -Xmx4g
        -Xms4g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=100
        -XX:+ParallelRefProcEnabled
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - aml-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G

  # ============================================================
  # FEATURE ENGINE (Kafka Consumer)
  # ============================================================
  feature-engine:
    build:
      context: ../backend
      dockerfile: Dockerfile.feature-engine
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud_detector
      SPRING_DATASOURCE_USERNAME: fraud_user
      SPRING_DATASOURCE_PASSWORD: fraud_secure_2024
      JAVA_OPTS: "-Xmx2g -Xms1g"
    networks:
      - aml-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 3G

  # ============================================================
  # RULE ENGINE (Stream Processor)
  # ============================================================
  rule-engine:
    build:
      context: ../backend
      dockerfile: Dockerfile.rule-engine
    depends_on:
      - kafka
      - redis
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
      JAVA_OPTS: "-Xmx2g -Xms1g"
    networks:
      - aml-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 3G

  # ============================================================
  # PROMETHEUS (Metrics)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: aml-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aml-network

  # ============================================================
  # GRAFANA (Dashboards)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: aml-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_secure_2024
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - aml-network
    depends_on:
      - prometheus

networks:
  aml-network:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  redis_data:
  postgres_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
