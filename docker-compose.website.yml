version: '3.8'

# Marketing Website Deployment
# - Static site served by nginx
# - Separate from the dashboard application

services:
  # Marketing Website
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: hokeka-website
    ports:
      - "8090:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - website-network
    restart: always

networks:
  website-network:
    driver: bridge