# Preprod Nginx Configuration with IP Whitelist
# Only allow specific IPs to access preprod environment

server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # IP Whitelist - Only these IPs can access preprod
    # Configure ALLOWED_IPS environment variable or edit below
    # Example: allow 192.168.1.0/24;
    # Example: allow 10.0.0.1;
    # Example: allow 72.62.133.45;
    
    # Deny all by default
    # deny all;
    
    # Allow specific IPs (edit these or use envsubst to inject from environment)
    # allow ${PREPROD_ALLOWED_IP};
    
    # Alternatively, use a map in nginx.conf and include allowed_ips.conf
    # For now, using a placeholder - replace with actual IPs
    
    # IP Restriction - Uncomment and configure:
    # allow 192.168.1.0/24;  # Office network
    # allow 10.0.0.0/8;      # VPN range
    # deny all;              # Deny everyone else
    
    # Frontend - serve static files
    location / {
        # IP check (add your allowed IPs here)
        # satisfy any;
        # allow 192.168.1.0/24;
        # deny all;
        
        proxy_pass http://frontend-preprod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend-preprod:80;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        # IP check (add your allowed IPs here)
        # satisfy any;
        # allow 192.168.1.0/24;
        # deny all;
        
        proxy_pass http://backend-preprod:2637/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# To use IP whitelisting, create allowed-ips.conf:
# allow 192.168.1.0/24;
# allow 10.0.0.0/8;
# deny all;
# Then include it: include /etc/nginx/allowed-ips.conf;
