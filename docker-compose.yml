version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fraud-detector-postgres
    environment:
      POSTGRES_DB: fraud_detector
      POSTGRES_USER: ${DATABASE_USERNAME:-fraud_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-fraud_user} -d fraud_detector"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-network

  # Aerospike Cache
  aerospike:
    image: aerospike/aerospike-server:6.4
    container_name: fraud-detector-aerospike
    ports:
      - "3000:3000"
    volumes:
      - aerospike_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detector-network

  # Backend API
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fraud-detector-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/fraud_detector
      DATABASE_USERNAME: ${DATABASE_USERNAME:-fraud_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      AEROSPIKE_HOSTS: aerospike:3000
      SECURITY_ENCRYPTION_KEY: ${SECURITY_ENCRYPTION_KEY:-changeme}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SERVER_PORT: 2637
    ports:
      - "2637:2637"
    depends_on:
      postgres:
        condition: service_healthy
      aerospike:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2637/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fraud-detector-network

  # Frontend
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: fraud-detector-frontend
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - fraud-detector-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: fraud-detector-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates here
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - fraud-detector-network

volumes:
  postgres_data:
  aerospike_data:

networks:
  fraud-detector-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
