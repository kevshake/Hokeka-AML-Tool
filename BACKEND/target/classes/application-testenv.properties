# Application Test Environment - Quick Fix

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:15432/fraud_detector_test}
spring.datasource.username=${DATABASE_USERNAME:fraud_detector_test}
spring.datasource.password=${DATABASE_PASSWORD:test_password_secure}

# JPA/Hibernate - Generate schema from entities (TEST ONLY)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# Disable Flyway for entity-generated schema
spring.flyway.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.posgateway.aml=DEBUG

# Disable external services for testing
sumsub.enabled=false
scoring.service.enabled=false
sanctions.download.enabled=false

# Disable Aerospike
aerospike.enabled=false

# Security
custom.jwt.secret=test-secret-key-for-development-only-do-not-use-in-production
