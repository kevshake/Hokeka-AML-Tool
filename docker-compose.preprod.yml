# Pre-Production Environment
# Ports: Nginx 8089 (Frontend), Backend 2639 (internal only), Postgres 25433, Aerospike 3001

version: '3.8'

services:
  # Nginx Reverse Proxy (Preprod)
  nginx-preprod:
    image: nginx:1.25-alpine
    container_name: fd-preprod-nginx
    ports:
      - "8089:80"
    volumes:
      - ./nginx-preprod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-preprod
      - backend-preprod
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # PostgreSQL Database (Preprod) - Port 25433
  postgres-preprod:
    image: postgres:15-alpine
    container_name: fd-preprod-postgres
    environment:
      POSTGRES_DB: fraud_detector_preprod
      POSTGRES_USER: fd_preprod
      POSTGRES_PASSWORD: ${PREPROD_DB_PASSWORD:-preprod_secure_2024}
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fd_preprod -d fraud_detector_preprod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Aerospike Cache (Preprod) - Port 3001
  aerospike-preprod:
    image: aerospike/aerospike-server:6.4
    container_name: fd-preprod-aerospike
    ports:
      - "3001:3000"
    volumes:
      - aerospike_preprod_data:/opt/aerospike/data
    ulimits:
      nofile:
        soft: 15000
        hard: 15000
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Backend API (Preprod) - Internal only
  backend-preprod:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: fd-preprod-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-preprod:5432/fraud_detector_preprod
      DATABASE_USERNAME: fd_preprod
      DATABASE_PASSWORD: ${PREPROD_DB_PASSWORD:-preprod_secure_2024}
      AEROSPIKE_HOSTS: aerospike-preprod:3000
      SERVER_PORT: 2639
      SPRING_PROFILES_ACTIVE: preprod
      # CORS - allow internal nginx and localhost for dev
      CORS_ALLOWED_ORIGINS: http://localhost:8089,http://localhost
    # No external port exposed - only accessible via nginx internally
    depends_on:
      postgres-preprod:
        condition: service_healthy
      aerospike-preprod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2639/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - fd-preprod-network
    restart: unless-stopped

  # Frontend (Preprod) - Internal only, served via nginx
  frontend-preprod:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        # Use relative URL - nginx will proxy /api to backend
        VITE_API_URL: /api
    container_name: fd-preprod-frontend
    environment:
      VITE_API_URL: /api
    # No external port exposed - only accessible via nginx
    depends_on:
      - backend-preprod
    networks:
      - fd-preprod-network
    restart: unless-stopped

volumes:
  postgres_preprod_data:
  aerospike_preprod_data:

networks:
  fd-preprod-network:
    driver: bridge
