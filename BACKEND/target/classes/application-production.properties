# =============================================================================
# PRODUCTION PROFILE - Internet Exposure Configuration
# Profile: production (for hokeka.com external access)
# =============================================================================
# Usage: java -jar app.jar --spring.profiles.active=production
# =============================================================================

# =============================================================================
# Server Configuration - External Exposure
# =============================================================================
# Bind to all interfaces (0.0.0.0) for external access
server.address=0.0.0.0
server.port=${SERVER_PORT:2637}
server.servlet.context-path=/api/v1

# Forwarded headers support (for nginx reverse proxy)
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto

# =============================================================================
# SSL/TLS Configuration (Terminating at nginx - see deployment docs)
# If SSL is handled by Spring Boot directly (not recommended with nginx):
# server.ssl.enabled=true
# server.ssl.key-store=${SSL_KEYSTORE_PATH}
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# =============================================================================

# =============================================================================
# Database Configuration - Production PostgreSQL
# =============================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - PRODUCTION (NO create-drop!)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false

# Critical: Disable auto schema generation in production
spring.jpa.properties.hibernate.hbm2ddl.auto=none

# Flyway - ENABLED for production migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

# =============================================================================
# HikariCP Connection Pool - Production Tuning
# =============================================================================
# Maximum connections (tune based on PostgreSQL max_connections)
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:50}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_THRESHOLD:60000}

# Pool naming for monitoring
spring.datasource.hikari.pool-name=FraudDetectorHikariPool

# Connection test query
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================================================================
# Tomcat Thread Pool - Production Throughput
# =============================================================================
# Conservative settings for production (tune based on load testing)
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE:50}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:400}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:2000}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:1000}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:20000}
server.tomcat.keep-alive-timeout=${TOMCAT_KEEPALIVE_TIMEOUT:60000}
server.tomcat.max-keep-alive-requests=${TOMCAT_MAX_KEEPALIVE:100}

# =============================================================================
# CORS Configuration - hokeka.com Domains
# =============================================================================
# These properties are consumed by WebMvcConfig
# Allow specific origins for external testing
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://hokeka.com,https://www.hokeka.com,https://api.hokeka.com,https://app.hokeka.com}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,Accept,Origin,X-CSRF-Token,X-Api-Key}
cors.exposed-headers=${CORS_EXPOSED_HEADERS:X-Total-Count,X-Page-Count,X-Current-Page}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}

# =============================================================================
# Security Configuration
# =============================================================================
# JWT Configuration - Use strong secret from environment
custom.jwt.secret=${JWT_SECRET}
custom.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}
custom.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# CSRF Configuration - Enabled for production with proper domain
custom.csrf.enabled=${CSRF_ENABLED:true}
custom.csrf.cookie.secure=${CSRF_COOKIE_SECURE:true}
custom.csrf.cookie.same-site=${CSRF_COOKIE_SAME_SITE:Strict}

# Session Configuration
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.http-only=${SESSION_COOKIE_HTTP_ONLY:true}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Strict}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

# Encryption Keys - MUST be set via environment variables
security.encryption.key=${ENCRYPTION_KEY}
audit.hmac.key=${AUDIT_HMAC_KEY}

# PII Masking - Always enabled in production
security.pii.masking.enabled=true

# Rate Limiting - Production values
rate.limit.enabled=${RATE_LIMIT_ENABLED:true}
rate.limit.requests-per-minute=${RATE_LIMIT_RPM:100}
rate.limit.burst-size=${RATE_LIMIT_BURST:20}
rate.limit.auth-endpoint-rpm=${RATE_LIMIT_AUTH_RPM:10}

# =============================================================================
# Logging Configuration - Production
# =============================================================================
logging.level.root=WARN
logging.level.com.posgateway.aml=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Structured logging for production
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n

# Log file configuration
logging.file.name=${LOG_FILE_PATH:/var/log/fraud-detector/application.log}
logging.file.max-size=${LOG_FILE_MAX_SIZE:100MB}
logging.file.max-history=${LOG_FILE_MAX_HISTORY:30}
logging.file.total-size-cap=${LOG_FILE_TOTAL_SIZE_CAP:3GB}

# =============================================================================
# Monitoring & Actuator - Production Security
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoints.web.base-path=/actuator

# Health check customization
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true

# =============================================================================
# External Services - Production Endpoints
# =============================================================================
# Sumsub (KYC) - Enable if needed for production
sumsub.enabled=${SUMSUB_ENABLED:false}
sumsub.api.url=${SUMSUB_API_URL:https://api.sumsub.com/resources}
sumsub.api.key=${SUMSUB_API_KEY:}
sumsub.api.secret=${SUMSUB_API_SECRET:}

# Scoring Service
scoring.service.enabled=${SCORING_SERVICE_ENABLED:false}
scoring.service.url=${SCORING_SERVICE_URL:}
scoring.service.retry.max=3

# Sanctions Screening
sanctions.download.enabled=${SANCTIONS_DOWNLOAD_ENABLED:false}
screening.realtime.enabled=${SCREENING_REALTIME_ENABLED:true}
screening.realtime.block-on-match=true

# =============================================================================
# Cache & Performance
# =============================================================================
cache.aggregate.expire.minutes=30
cache.config.expire.minutes=15

# =============================================================================
# Kafka - Production Configuration
# =============================================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:}
spring.kafka.admin.auto-create=false
spring.kafka.consumer.group-id=fraud-detector-prod

# Production retry configuration
spring.kafka.consumer.properties.reconnect.backoff.ms=5000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=30000
spring.kafka.consumer.properties.retry.backoff.ms=5000
spring.kafka.consumer.properties.retry.backoff.max.ms=30000

# =============================================================================
# Feature Flags - Production
# =============================================================================
# Disable development features
aerospike.enabled=${AEROSPIKE_ENABLED:false}
neo4j.enabled=${NEO4J_ENABLED:false}
slack.enabled=${SLACK_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}

# =============================================================================
# HTTP/2 Configuration
# =============================================================================
server.http2.enabled=${HTTP2_ENABLED:true}
http2.auto.detect.enabled=true
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
